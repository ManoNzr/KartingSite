<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | GAME NAME</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           RETOUR DES TRUCS JOLIS (CSS SPECIFIQUE)
           ========================================= */

        /* --- 1. Barre d'action et Recherche Glow --- */
        .action-bar {
            max-width: 900px;
            margin: 0 auto 30px auto;
            display: flex;
            gap: 15px;
            padding: 0 20px;
        }

        .search-wrapper { flex: 2; position: relative; }

        .search-input {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 18px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            backdrop-filter: blur(15px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        /* L'effet Glow miam sur le focus */
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.3);
            transform: translateY(-2px);
        }

        /* --- 2. Tri sélecteur style Apple --- */
        .sort-wrapper {
            flex: 1;
            position: relative;
            min-width: 200px;
        }

        /* La petite flèche personnalisée */
        .sort-wrapper::after {
            content: '↓';
            font-size: 14px;
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            pointer-events: none;
            transition: 0.3s;
        }

        .sort-wrapper:hover::after { transform: translateY(-30%); }

        .sort-select {
            width: 100%;
            appearance: none; /* Cache le style par défaut moche */
            -webkit-appearance: none;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 16px 45px 16px 20px; /* Espace à droite pour la flèche */
            border-radius: 18px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(15px);
            outline: none;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sort-select:focus, .sort-select:hover {
            border-color: var(--text-dim);
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        /* Force le fond sombre sur les options (dépend du navigateur) */
        .sort-select option {
            background: #1c1c1e;
            color: white;
            padding: 10px;
        }

        /* --- 3. Médailles Argent et Bronze qui brillent --- */
        /* Note: Gold est déjà dans style.css, on l'exagère ici */
        .rank-badge.gold {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.5), 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .rank-badge.silver {
            background: linear-gradient(135deg, #E0E0E0, #8E8E93);
            color: #000;
            box-shadow: 0 4px 15px rgba(192, 192, 192, 0.5);
        }

        .rank-badge.bronze {
            background: linear-gradient(135deg, #CD7F32, #8C592E);
            color: #fff;
            box-shadow: 0 4px 15px rgba(205, 127, 50, 0.5);
        }

        /* --- 4. Effet Hover sur les lignes du tableau --- */
        tr td { transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        tr:hover td {
            background: rgba(255, 45, 85, 0.05) !important; /* Léger fond rouge */
            border-bottom-color: var(--accent); /* Barre rouge en bas */
        }
        
        /* Au lieu d'agrandir toute la ligne et de créer une scrollbar, 
           on décale juste le nom du joueur en douceur ! */
        tr:hover td:nth-child(2) {
            padding-left: 10px; 
        }
        
        /* Petit fix responsive pour la barre d'action */
        @media (max-width: 600px) {
            .action-bar { flex-direction: column; }
            .sort-wrapper { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="nav-wrapper">
        <nav>
            <a href="index.html">Accueil</a>
            <a href="team.html">Équipe</a>
            <a href="leaderboard.html" class="active">Leaderboard</a>
            <a href="download.html">Télécharger</a>
        </nav>
    </div>
    
    <div class="theme-switch" id="theme-toggle">
		<div class="switch-dot" id="theme-icon">🌙</div>
	</div>

    <section class="hero-title-centered" style="height: 35vh;">
        <h1 class="reveal active" style="font-size: clamp(50px, 8vw, 80px); font-weight: 800; letter-spacing: -3px;">Classement</h1>
        <!-- <p class="reveal active" style="color: var(--accent); font-weight: 700; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px;">Elite Team</p> -->
    </section>

    <div class="action-bar reveal active">
        <div class="search-wrapper">
            <input type="text" id="search-player" class="search-input" placeholder="Chercher un pilote...">
        </div>
        <div class="sort-wrapper">
            <select id="sort-order" class="sort-select">
                <option value="rank">Par Rang (Top 1)</option>
                <option value="name-asc">Nom (A-Z)</option>
                <option value="name-desc">Nom (Z-A)</option>
            </select>
        </div>
    </div>

    <div style="max-width: 900px; margin: auto; padding: 0 20px 50px; display: flex; justify-content: center;">
        <div class="reveal active glass-card">
            <table>
                <thead style="background: rgba(255,255,255,0.02);">
                    <tr style="font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px;">
                        <th style="padding-left: 25px; width: 100px;">RANG</th>
                        <th>PILOTE</th>
                        <th style="text-align: right; padding-right: 40px;">CHRONO</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>
	<div class="pagination reveal active">
        <button id="prev-btn" class="page-btn" onclick="changePage(-1)" disabled>PRÉCÉDENT</button>
        <span id="page-info">PAGE 1</span>
        <button id="next-btn" class="page-btn" onclick="changePage(1)">SUIVANT</button>
    </div>
	
	<footer class="site-footer">
    <div class="footer-container">
        <div class="footer-block">
            <span class="footer-label">Projet</span>
            <span class="footer-text">GAME NAME — Build 0.0.0-Alpha</span>
            <span class="footer-text">Rubika Réunion / 2026</span>
        </div>

        <div class="footer-block" style="text-align: right;">
            <span class="footer-label">Développement</span>
            <span class="footer-text">© Team NOM DU GROUPE — Tous droits réservés</span>
            <span class="footer-text">Game Design & Programming Campus</span>
        </div>
    </div>
	</footer>

    <script>
        let allPlayers = [];
		let currentPage = 1;
		const itemsPerPage = 10; // On en affiche 10 par 10

		function formatChrono(ms) {
			let mins = Math.floor(ms / 60000);
			let secs = Math.floor((ms % 60000) / 1000);
			let mms = ms % 1000;
			return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}:${mms.toString().padStart(3, '0')}`;
		}

		function displayPlayers() {
			const body = document.getElementById('table-body');
			const searchTerm = document.getElementById('search-player').value.toLowerCase();
			
			// 1. Filtrer
			let filtered = allPlayers.filter(p => {
				const name = (p.player && p.player.name) ? p.player.name.toLowerCase() : "anonyme";
				return name.includes(searchTerm);
			});

			// 2. Trier (Selon le select)
			const sortOrder = document.getElementById('sort-order').value;
			if (sortOrder === "name-asc") {
				filtered.sort((a, b) => (a.player?.name || "").localeCompare(b.player?.name || ""));
			} else if (sortOrder === "name-desc") {
				filtered.sort((a, b) => (b.player?.name || "").localeCompare(a.player?.name || ""));
			} else {
				filtered.sort((a, b) => a.rank - b.rank);
			}

			// 3. Paginer
			const totalPages = Math.ceil(filtered.length / itemsPerPage);
			const start = (currentPage - 1) * itemsPerPage;
			const end = start + itemsPerPage;
			const paginatedItems = filtered.slice(start, end);

			// 4. Afficher avec animation "one by one"
			body.innerHTML = '';
			
			if (paginatedItems.length === 0) {
				body.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 40px;">Aucun pilote.</td></tr>';
			}

			paginatedItems.forEach((item, index) => {
				const playerName = (item.player && item.player.name) ? item.player.name : "Anonyme";
				let badgeClass = item.rank === 1 ? 'gold' : item.rank === 2 ? 'silver' : item.rank === 3 ? 'bronze' : 'other-rank';
				
				const row = document.createElement('tr');
				row.className = 'row-animate';
				// Le petit calcul magique pour le délai d'apparition
				row.style.animationDelay = `${index * 0.05}s`; 
				
				row.innerHTML = `
					<td style="padding-left: 25px;"><div class="rank-badge ${badgeClass}">${item.rank}</div></td>
					<td style="font-weight: 700; color: var(--text);">${playerName}</td>
					<td style="text-align: right; padding-right: 40px; font-family: monospace; font-weight: 800; color: var(--accent); font-size: 20px;">${formatChrono(item.score)}</td>
				`;
				body.appendChild(row);
			});

			// Mettre à jour l'UI des boutons
			document.getElementById('page-info').innerText = `PAGE ${currentPage} / ${totalPages || 1}`;
			document.getElementById('prev-btn').disabled = currentPage === 1;
			document.getElementById('next-btn').disabled = currentPage >= totalPages;
		}

		function changePage(direction) {
			currentPage += direction;
			displayPlayers();
			window.scrollTo({ top: 200, behavior: 'smooth' }); // Petit scroll auto
		}

		async function loadLB() {
			try {
				const API_KEY = "dev_3c4618fd7ae34068a8891dd75abc4dd1";
				const auth = await fetch("https://api.lootlocker.io/game/v2/session/guest", {
					method: "POST", headers: {"Content-Type": "application/json"},
					body: JSON.stringify({game_key: API_KEY, game_version: "0.1.0.0", development_mode: true})
				}).then(r => r.json());
				
				// On récupère un gros paquet de joueurs (ex: 100) pour pouvoir paginer
				const lb = await fetch("https://api.lootlocker.io/game/leaderboards/33908/list?count=100", {
					method: "GET", headers: {"x-session-token": auth.session_token}
				}).then(r => r.json());
				
				allPlayers = lb.items || [];
				displayPlayers();
			} catch(e) { console.error(e); }
		}

		// Listeners
		document.getElementById('search-player').addEventListener('input', () => { currentPage = 1; displayPlayers(); });
		document.getElementById('sort-order').addEventListener('change', () => { currentPage = 1; displayPlayers(); });
		window.addEventListener('DOMContentLoaded', loadLB);

		// --- 2. LOGIQUE DU THÈME (FIXED) ---
		const toggle = document.getElementById('theme-toggle');
		const icon = document.getElementById('theme-icon');

		const applyTheme = (t) => {
			if (t === "light") {
				document.documentElement.setAttribute("data-theme", "light");
				icon.innerText = "☀️";
			} else {
				document.documentElement.removeAttribute("data-theme");
				icon.innerText = "🌙";
			}
		};


		toggle.onclick = () => {
			const current = document.documentElement.hasAttribute("data-theme") ? "dark" : "light";
			localStorage.setItem("theme", current);
			applyTheme(current);
		};

		// Charger le thème sauvegardé au démarrage
		const savedTheme = localStorage.getItem("theme") || "dark";
		applyTheme(savedTheme);
    </script>
</body>
</html>
